    # ------------------- General Options -------------------------
description                  : Correlated FlowMatching
results_root_dir             : results_babel
dataset                      : babel

# ------------------- Dataset -------------------------
dataset_name                 : babel_dataset
past_frames                  : 30
future_frames                : 60
agents                       : 22
dt                           : 0.033
checkpt_freq                 : 10
data_dir: './data/babel_3060'

overfit: False
n_train: 9409
n_test: 2368
rotate: False
data_norm: 'min_max'
eval_on_train: False

# ---------------- checkpoint save ----------------
checkpt_freq: 5
max_num_ckpts: 5
load_pretrained: False
ckpt_path: 'results_babel/cor_babel_fm_m1_std/m3_drift_diffusion/models/checkpoint_best.pt'

# ---------------- pub hyper para ----------------

fix_random_seed: True
seed: 42
init_lr: 0.001

# ------------------- per hyper para -------------------------

denoising_method             : 'fm'
sampling_steps               : 100
t_schedule                   : 'logit_normal'
objective                    : 'pred_data'
sigma_data                   : 0.13

t_schedule: 'logit_normal' # choices=['uniform', 'logit_normal']
fm_skewed_t: null 
logit_norm_mean: -0.5
logit_norm_std: 1.5

fm_wrapper: 'direct' # choices=['direct', 'velocity', 'precond']
fm_rew_sqrt: False 
fm_in_scaling: True

drop_method: 'emb'
drop_logi_k: 20.0 # Logistic growth rate for masking rate at different timesteps.
drop_logi_m: 0.5  # Logistic midpoint for masking rate at different timesteps.

use_pre_norm: False # Where to normalize the input trajectories in the Transformer Encoders.
tied_noise: True

LOSS_NN_MODE: 'agent' # choices=['agent', 'scene', 'both']
LOSS_REG_REDUCTION: 'sum' # ['mean', 'sum']
LOSS_REG_SQUARED: False # Whether to use the squared regression loss.
LOSS_VELOCITY: False
LOSS_CTRL: False
LOSS_STAB: False
CNSDE       : 'm2'

weight_decay: null
solver: lin_poly
lin_poly_p: 5
lin_poly_long_step: 1000
save_samples: True

# -------------------- Logger config -----------------------------
notes                        : 'Flow Matching'

# ---------------------------- Configurations for model ----------------------------
MODEL:
    NAME: 'cogflow'
    AGENT_DIM: 3
    NUM_PROPOSED_QUERY: 20
    MODEL_OUT_DIM: 180
    REGRESSION_MLPS: [128, 256, 64, 3]
    CLASSIFICATION_MLPS: [128, 128, 1]
    NUM_REGIMES: 3

    USE_PE_QUERY: True
    USE_PE_AGENT: True

    COND_D_CUE: 13
    COND_D_HIST: 16
    COG_D_Z: 64
    CONTEXT_ENCODER:
        NAME: MTREncoder
        DATA_TYPE: babel
        NUM_OF_ATTN_NEIGHBORS: 22
        NUM_INPUT_CONTEXT: 9

        NUM_CHANNEL_IN_MLP_AGENT: 256
        NUM_LAYER_IN_MLP_AGENT: 3

        D_MODEL: 128
        NUM_ATTN_LAYERS: 4
        NUM_ATTN_HEAD: 8
        DROPOUT_OF_ATTN: 0.1

    MOTION_DECODER:
        NAME: MTRDecoder
        D_MODEL: 128
        NUM_DECODER_BLOCKS: 4
        NUM_ATTN_HEAD: 8
        DROPOUT_OF_ATTN: 0.1


denoising_head_preds         : 20
k_preds                      : 20

# ------------------------------- Optimizer Parameters ---------------------------------
train_batch_size             : 8
test_batch_size              : 8

OPTIMIZATION:
    NUM_EPOCHS: 600

    OPTIMIZER: AdamW
    LR: 0.001
    WEIGHT_DECAY: 0.05

    SCHEDULER: cosineAnnealingLRwithWarmup
    LR_CLIP: 0.000001

    GRAD_NORM_CLIP: 1.0

    LOSS_WEIGHTS: {
      'cls': 0,
      'reg': 1.0, 
      'vel': 0.2,
      'omega': 0,
    }
